version: "1.0"
salt_version: "3006"
type: state_module
module:
  name: user
  description: >-
    User account management states. Allows creating and managing user
    accounts on minions. Note: execution module functions such as
    user.rename cannot be called directly as states — use module.run
    to call execution modules from within the state system.
  doc_url: "https://docs.saltproject.io/en/latest/ref/states/all/salt.states.user.html"
  functions:

    - name: present
      description: >-
        Ensure that a user account exists with the specified attributes.
        If the user does not exist, it is created. If it exists but
        attributes differ, they are updated. When using the unless or
        onlyif requisites with a shell set to /sbin/nologin, use
        cmd_opts_exclude to prevent that shell from being passed to
        cmd.retcode.
      parameters:
        - name: name
          type: string
          required: true
          description: "Username of the account to manage."
          default_value: ~
        - name: uid
          type: int
          required: false
          description: "Numeric user ID (UID) to assign to the account."
          default_value: ~
        - name: gid
          type: int
          required: false
          description: "Numeric primary group ID (GID) for the account."
          default_value: ~
        - name: groups
          type: list
          required: false
          description: "List of supplementary groups the user should belong to."
          default_value: ~
        - name: home
          type: string
          required: false
          description: "Home directory path for the user."
          default_value: ~
        - name: shell
          type: string
          required: false
          description: >-
            Login shell for the user (e.g. "/bin/bash", "/sbin/nologin").
            When set to /sbin/nologin and used with unless/onlyif, add
            cmd_opts_exclude: [shell] to prevent the shell from being
            passed to cmd.retcode.
          default_value: ~
        - name: password
          type: string
          required: false
          description: >-
            Hashed password string for the user. Use the grains or pillar
            system to avoid storing plaintext passwords in states.
          default_value: ~
        - name: createhome
          type: bool
          required: false
          description: "If True, create the home directory if it does not exist."
          default_value: "true"
        - name: usergroup
          type: bool
          required: false
          description: >-
            If True, a group with the same name as the user will be created.
            If False, such a group will not be created. Defaults are
            distribution-specific. GNU/Linux only. Added in version 3001.
          default_value: ~
        - name: optional_groups
          type: list
          required: false
          description: >-
            A list of groups to assign the user to. If a group does not exist,
            it is silently ignored (unlike 'groups' which fails).
          default_value: ~
        - name: remove_groups
          type: bool
          required: false
          description: >-
            Remove groups that the user is a member of that were not specified
            in the state. Default is True.
          default_value: "true"
        - name: persist_home
          type: bool
          required: false
          description: >-
            If True and not on Windows or Darwin, move contents of the home
            directory to the new location when home changes.
          default_value: "false"
        - name: hash_password
          type: bool
          required: false
          description: "If True, hash the cleartext password. Default is False."
          default_value: "false"
        - name: enforce_password
          type: bool
          required: false
          description: >-
            If False, do not change the password if it has already been set and
            the hash differs. Only relevant when password is specified.
            Default is True.
          default_value: "true"
        - name: empty_password
          type: bool
          required: false
          description: "If True, enable password-less login. Default is False."
          default_value: "false"
        - name: password_lock
          type: bool
          required: false
          description: >-
            Set to False to unlock a user's password. On non-Windows, can be
            set to True to lock. Default is None (no action). Added in 3006.0.
          default_value: ~
        - name: unique
          type: bool
          required: false
          description: "Require a unique UID. Default is True."
          default_value: "true"
        - name: system
          type: bool
          required: false
          description: >-
            If True, choose UID in the range of FIRST_SYSTEM_UID and
            LAST_SYSTEM_UID. Default is False.
          default_value: "false"
        - name: loginclass
          type: string
          required: false
          description: "The login class (BSD only). Defaults to empty."
          default_value: ~
        - name: fullname
          type: string
          required: false
          description: "The user's full name (GECOS field). Linux, BSD, macOS."
          default_value: ~
        - name: roomnumber
          type: string
          required: false
          description: "The user's room number (GECOS field). Linux and BSD only."
          default_value: ~
        - name: workphone
          type: string
          required: false
          description: "The user's work phone number (GECOS field). Linux and BSD only."
          default_value: ~
        - name: homephone
          type: string
          required: false
          description: "The user's home phone number (GECOS field). Linux and BSD only."
          default_value: ~
        - name: other
          type: string
          required: false
          description: >-
            The user's 'other' GECOS attribute. Linux and BSD only. Contains
            remaining GECOS fields if there are more than 4 commas.
          default_value: ~
        - name: date
          type: int
          required: false
          description: >-
            Shadow attribute: date of last password change in days since epoch
            (January 1, 1970). Linux only.
          default_value: ~
        - name: mindays
          type: int
          required: false
          description: "Shadow attribute: minimum number of days between password changes."
          default_value: ~
        - name: maxdays
          type: int
          required: false
          description: "Shadow attribute: maximum number of days between password changes."
          default_value: ~
        - name: inactdays
          type: int
          required: false
          description: "Shadow attribute: number of days after expiry before account is locked."
          default_value: ~
        - name: warndays
          type: int
          required: false
          description: "Shadow attribute: number of days prior to maxdays to warn users."
          default_value: ~
        - name: expire
          type: int
          required: false
          description: "Shadow attribute: account expiry date in days since epoch."
          default_value: ~
        - name: allow_uid_change
          type: bool
          required: false
          description: "Set to True to allow the state to update the UID. Added in 2018.3.1."
          default_value: "false"
        - name: allow_gid_change
          type: bool
          required: false
          description: "Set to True to allow the state to update the GID. Added in 2018.3.1."
          default_value: "false"
        - name: nologinit
          type: bool
          required: false
          description: >-
            If True, do not add the user to lastlog and faillog databases.
            Not supported on Windows.
          default_value: "false"
        - name: local
          type: bool
          required: false
          description: >-
            Create the user account locally, ignoring global account management
            (requires luseradd). Added in version 3007.0.
          default_value: "false"
      examples:
        - |
          jim_nologin:
            user.present:
              - name: jim
              - shell: /sbin/nologin
              - unless:
                - echo hello world
              - cmd_opts_exclude:
                - shell
        - |
          webuser:
            user.present:
              - name: www-data
              - shell: /usr/sbin/nologin
              - groups:
                - www-data

    - name: absent
      description: >-
        Ensure that a user account does not exist. If the user exists,
        it is removed.
      parameters:
        - name: name
          type: string
          required: true
          description: "Username of the account to remove."
          default_value: ~
        - name: purge
          type: bool
          required: false
          description: "If True, remove the user's home directory as well."
          default_value: "false"
        - name: force
          type: bool
          required: false
          description: "If True, force removal even if the user is logged in."
          default_value: "false"
        - name: local
          type: bool
          required: false
          description: >-
            Remove the user account locally, ignoring global account management
            (requires luserdel). Added in version 3007.0.
          default_value: "false"
      examples:
        - |
          remove_old_user:
            user.absent:
              - name: olduser
              - purge: True
