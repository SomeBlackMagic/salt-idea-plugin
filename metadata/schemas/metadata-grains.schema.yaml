$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://someblackmagic.github.io/salt-idea-plugin/schemas/metadata/metadata-grains.schema.yaml"
title: "Salt Grains Metadata"
type: object
additionalProperties: false
required: ["version", "salt_version", "type", "grains"]
properties:
  version:
    $ref: "metadata-common.schema.yaml#/$defs/metadataVersion"
  salt_version:
    $ref: "metadata-common.schema.yaml#/$defs/saltVersion"
  type:
    const: "grains"
  grains:
    type: array
    items:
      type: object
      additionalProperties: false
      required: ["name", "type"]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        type:
          $ref: "metadata-common.schema.yaml#/$defs/parameterType"
        values:
          type: array
          items:
            type: string
