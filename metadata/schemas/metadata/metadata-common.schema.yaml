$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://someblackmagic.github.io/salt-idea-plugin/schemas/metadata/metadata-common.schema.yaml"
title: "Salt Metadata Common Definitions"
type: object
$defs:
  metadataVersion:
    type: string
    minLength: 1
  saltVersion:
    type: string
    pattern: "^[0-9]+(\\.[0-9]+)?$"
  parameterType:
    type: string
    enum: ["string", "list", "dict", "bool", "int", "float"]
  moduleDocUrl:
    type: string
    format: uri
  parameter:
    type: object
    additionalProperties: false
    required: ["name", "type", "required"]
    properties:
      name:
        type: string
        minLength: 1
      type:
        $ref: "#/$defs/parameterType"
      required:
        type: boolean
      description:
        type: string
      default_value:
        type: ["string", "null"]
  stateFunction:
    type: object
    additionalProperties: false
    required: ["name"]
    properties:
      name:
        type: string
        minLength: 1
      description:
        type: string
      parameters:
        type: array
        items:
          $ref: "#/$defs/parameter"
      examples:
        type: array
        items:
          type: string
  executionFunction:
    type: object
    additionalProperties: false
    required: ["name"]
    properties:
      name:
        type: string
        minLength: 1
      description:
        type: string
      parameters:
        type: array
        items:
          $ref: "#/$defs/parameter"
